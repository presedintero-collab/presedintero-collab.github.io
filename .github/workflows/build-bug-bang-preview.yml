name: Clean invalid BUG BANG preview

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-bug-bang-preview.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove invalid preview files
        run: rm -rf bug-bang-preview
      - name: Commit cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A bug-bang-preview
          if git diff --cached --quiet; then
            echo 'No preview files remain.'
          else
            git commit -m 'Remove invalid BUG BANG migration preview'
            git push
          fi
